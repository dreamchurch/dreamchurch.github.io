<div class="yt-facade mb-3" data-youtube-id="{{ include.id }}"
     style="cursor:pointer; position:relative; padding-bottom:56.25%; background:#000; overflow:hidden;">
  <img
    src="https://img.youtube.com/vi/{{ include.id }}/maxresdefault.jpg"
    alt="{{ include.subtitle }}"
    style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.85;"
  />
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
              width:68px; height:48px; background:#ff0000; border-radius:12px;
              display:flex; align-items:center; justify-content:center; pointer-events:none;">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="white">
      <path d="M8 5v14l11-7z"/>
    </svg>
  </div>
</div>

<script>
  if (!window._ytFacadeReady) {
    window._ytFacadeReady = true;
    document.addEventListener('click', function (e) {
      var facade = e.target.closest('.yt-facade');
      if (!facade || facade.querySelector('iframe')) return;
      var id = facade.getAttribute('data-youtube-id');
      var iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&enablejsapi=1';
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
      iframe.setAttribute('allowfullscreen', '');
      iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:0;';
      facade.innerHTML = '';
      facade.appendChild(iframe);
    });
  }
</script>
